apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: cap-prod-open-webui
  labels:
    app: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
          env:
            - name: OPENAI_API_BASE_URLS
              value: "http://vllm-server.cap-prod-vllm-server.svc.cluster.local:8000/v1;http://vllm-reasoning.cap-prod-vllm-reasoning.svc.cluster.local:8000/v1"
            - name: OPENAI_API_KEYS
              value: "dummy;dummy"
            - name: WEBUI_URL
              value: "https://nahui-ai.ddns.net/webui"
            - name: WEBUI_AUTH
              value: "true"
            - name: ENABLE_SIGNUP
              value: "true"
            - name: DEFAULT_USER_ROLE
              value: "user"
            - name: DATA_DIR
              value: "/app/backend/data"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data
