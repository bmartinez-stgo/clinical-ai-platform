apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-webui-assets
  namespace: cap-prod-open-webui
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nahui-ai.ddns.net
      secretName: open-webui-tls
  rules:
    - host: nahui-ai.ddns.net
      http:
        paths:
          - path: /_app/
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
          - path: /static/
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
          - path: /workspace
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
          - path: /settings
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
          - path: /playground
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
          - path: /channels
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
          - path: /notes
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
          - path: /memories
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
          - path: /s/
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
          - path: /ws/
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
