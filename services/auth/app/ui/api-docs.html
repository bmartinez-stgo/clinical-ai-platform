<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinical AI Platform — API Reference</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    body { margin: 0; background: #1a1a2e; }
    #swagger-ui .topbar { display: none; }
    #swagger-ui .info .title { color: #e0e0e0; }
    .download-sdk {
      background: #16213e;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #0f3460;
    }
    .download-sdk a {
      color: #4fc3f7;
      text-decoration: none;
      font-family: sans-serif;
      font-size: 14px;
      padding: 6px 14px;
      border: 1px solid #4fc3f7;
      border-radius: 4px;
    }
    .download-sdk a:hover { background: #4fc3f733; }
    .download-sdk span { color: #90a4ae; font-family: sans-serif; font-size: 13px; }
  </style>
</head>
<body>
  <div class="download-sdk">
    <a href="clinical_ai_client.py" download>Download Python SDK</a>
    <span>Auto-renewing client with <code style="color:#b2ebf2">ClinicalAIClient(base_url, client_id, client_secret)</code></span>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
  <script>
    SwaggerUIBundle({
      url: "openapi.json",
      dom_id: "#swagger-ui",
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
      layout: "StandaloneLayout",
      deepLinking: true,
      displayRequestDuration: true,
      persistAuthorization: true,
    });
  </script>
</body>
</html>
