apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "clinical-stt.fullname" . }}-redis
  labels:
    {{- include "clinical-stt.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.redis.persistence.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size }}
{{- if .Values.modelCache.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "clinical-stt.fullname" . }}-model-cache
  labels:
    {{- include "clinical-stt.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.modelCache.persistence.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.modelCache.persistence.size }}
{{- end }}
