apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clinical-stt.fullname" . }}
  labels:
    {{- include "clinical-stt.labels" . | nindent 4 }}
data:
  APP_NAME: {{ .Values.app.name | quote }}
  APP_NAMESPACE: {{ .Values.app.namespace | quote }}
  APP_PORT: {{ .Values.app.port | quote }}
  LOG_LEVEL: {{ .Values.app.logLevel | quote }}
  SERVICE_VERSION: {{ .Values.app.serviceVersion | quote }}
  ENVIRONMENT: {{ .Values.app.environment | quote }}
  REDIS_URL: "redis://clinical-stt-redis:{{ .Values.redis.port }}"
  WHISPER_MODEL: {{ .Values.app.whisperModel | quote }}
  WHISPER_DEVICE: {{ .Values.app.whisperDevice | quote }}
  WHISPER_COMPUTE_TYPE: {{ .Values.app.whisperComputeType | quote }}
  HF_HOME: {{ .Values.app.hfHome | quote }}
  VLLM_REASONING_URL: {{ .Values.app.vllmReasoningUrl | quote }}
  VLLM_REASONING_MODEL: {{ .Values.app.vllmReasoningModel | quote }}
  VLLM_TIMEOUT_SECONDS: {{ .Values.app.vllmTimeoutSeconds | quote }}
  MAX_TOKENS: {{ .Values.app.maxTokens | quote }}
  TEMPERATURE: {{ .Values.app.temperature | quote }}
  MAX_AUDIO_SIZE_BYTES: {{ .Values.app.maxAudioSizeBytes | quote }}
  JOB_TTL_SECONDS: {{ .Values.app.jobTtlSeconds | quote }}
