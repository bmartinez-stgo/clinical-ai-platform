replicaCount: 1

image:
  repository: vllm/vllm-openai
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

app:
  name: vllm-server
  namespace: cap-prod-vllm-server
  modelId: Qwen/Qwen2.5-VL-7B-Instruct
  dtype: bfloat16
  maxModelLen: "8192"
  gpuMemoryUtilization: "0.90"
  port: 8000
  hfHome: /var/cache/huggingface

gpu:
  enabled: true
  count: 1

resources:
  requests:
    cpu: "2"
    memory: 20Gi
  limits:
    cpu: "6"
    memory: 40Gi

cache:
  mountPath: /var/cache/huggingface
  persistence:
    existingClaim: "ai-engine"

podLabels: {}
podAnnotations: {}

runtimeClassName: nvidia
nodeSelector:
  workload: large-models
tolerations: []
affinity: {}
