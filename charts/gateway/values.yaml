replicaCount: 1

image:
  repository: registry:5000/gateway
  tag: prod-latest
  pullPolicy: Always

service:
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

ingress:
  enabled: true
  host: nahui-ai.ddns.net
  clusterIssuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: nahui-ai-tls

proxyRoutes:
  - prefix: /portal
    upstream: http://ai-engine-portal.cap-prod-ai-engine-portal.svc.cluster.local:8084
  - prefix: /auth
    upstream: http://auth.cap-prod-auth.svc.cluster.local:8081
  - prefix: /documents
    upstream: http://document-reader.cap-prod-document-reader.svc.cluster.local:8082
  - prefix: /diagnostics
    upstream: http://ai-diagnostic.cap-prod-ai-diagnostic.svc.cluster.local:8083
  - prefix: /rag
    upstream: http://clinical-rag.cap-prod-clinical-rag.svc.cluster.local:8085
  - prefix: /clinical-chat
    upstream: http://clinical-chat.cap-prod-clinical-chat.svc.cluster.local:8086

env:
  APP_NAME: gateway
  APP_NAMESPACE: cap-prod-gateway
  APP_ENV: production
  APP_PORT: "8080"
  LOG_LEVEL: INFO
  SERVICE_VERSION: "0.1.0"
  AUTH_SERVICE_URL: http://auth.cap-prod-auth.svc.cluster.local:8081
  REQUEST_TIMEOUT_SECONDS: "300"
  METRICS_ENABLED: "true"
  METRICS_PATH: "/metrics"
  READINESS_CHECK_AUTH: "false"
  TRACING_ENABLED: "false"
  OTEL_SERVICE_NAME: gateway
  OTEL_SERVICE_NAMESPACE: cap-prod-gateway
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability:4318/v1/traces

serviceMonitor:
  enabled: true
  interval: 15s
