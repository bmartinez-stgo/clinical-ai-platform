apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cap-prod-ai-diagnostic
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cap-prod-clinical-chat
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cap-prod-clinical-stt
      ports:
        - port: 8000
          protocol: TCP
