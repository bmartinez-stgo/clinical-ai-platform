apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vllm-reasoning.fullname" . }}
  namespace: {{ .Values.app.namespace }}
  labels:
    {{- include "vllm-reasoning.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "vllm-reasoning.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vllm-reasoning.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      runtimeClassName: {{ .Values.runtimeClassName | quote }}
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ include "vllm-reasoning.fullname" . }}
      containers:
        - name: vllm-reasoning
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--model"
            - {{ .Values.app.modelId | quote }}
            - "--dtype"
            - {{ .Values.app.dtype | quote }}
            - "--quantization"
            - {{ .Values.app.quantization | quote }}
            - "--max-model-len"
            - {{ .Values.app.maxModelLen | quote }}
            - "--gpu-memory-utilization"
            - {{ .Values.app.gpuMemoryUtilization | quote }}
            - "--port"
            - {{ .Values.app.port | quote }}
            - "--host"
            - "0.0.0.0"
          env:
            - name: HF_HOME
              value: {{ .Values.app.hfHome | quote }}
            - name: TRANSFORMERS_CACHE
              value: "{{ .Values.app.hfHome }}/transformers"
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.cache.mountPath }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            limits:
              {{- toYaml .Values.resources.limits | nindent 14 }}
              {{- if .Values.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.gpu.count }}
              {{- end }}
            requests:
              {{- toYaml .Values.resources.requests | nindent 14 }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
