replicaCount: 1

image:
  repository: vllm/vllm-openai
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

app:
  name: vllm-reasoning
  namespace: cap-prod-vllm-reasoning
  modelId: Qwen/Qwen2.5-32B-Instruct-AWQ
  dtype: half
  maxModelLen: "8192"
  gpuMemoryUtilization: "0.92"
  quantization: awq_marlin
  port: 8000
  hfHome: /var/cache/huggingface

gpu:
  enabled: true
  count: 1

resources:
  requests:
    cpu: "4"
    memory: 16Gi
  limits:
    cpu: "8"
    memory: 32Gi

cache:
  mountPath: /var/cache/huggingface
  persistence:
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 60Gi

podLabels: {}
podAnnotations: {}

runtimeClassName: nvidia
nodeSelector:
  gpu: rtx3090
tolerations: []
affinity: {}
