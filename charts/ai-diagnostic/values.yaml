replicaCount: 1

image:
  repository: registry:5000/ai-diagnostic
  tag: prod-latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8083
  targetPort: 8083

app:
  name: ai-diagnostic
  namespace: cap-prod-ai-diagnostic
  port: 8083
  logLevel: INFO
  serviceVersion: "0.1.0"
  environment: prod
  vllmReasoningUrl: http://vllm-reasoning.cap-prod-vllm-reasoning.svc.cluster.local:8000
  vllmReasoningModel: hugging-quants/Meta-Llama-3.1-8B-Instruct-AWQ-INT4
  vllmTimeoutSeconds: "120"
  maxTokens: "1024"
  temperature: "0.1"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

podLabels: {}
podAnnotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
