apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "document-reader.fullname" . }}
  labels:
    {{- include "document-reader.labels" . | nindent 4 }}
data:
  APP_NAME: {{ .Values.app.name | quote }}
  APP_NAMESPACE: {{ .Values.app.namespace | quote }}
  APP_PORT: {{ .Values.app.port | quote }}
  LOG_LEVEL: {{ .Values.app.logLevel | quote }}
  SERVICE_VERSION: {{ .Values.app.serviceVersion | quote }}
  ENVIRONMENT: {{ .Values.app.environment | quote }}
  MAX_UPLOAD_SIZE_BYTES: {{ .Values.app.maxUploadSizeBytes | quote }}
  RENDER_DPI: {{ .Values.app.renderDpi | quote }}
  MAX_IMAGE_DIMENSION: {{ .Values.app.maxImageDimension | quote }}
  AI_ENGINE_URL: {{ .Values.app.aiEngineUrl | quote }}
  AI_ENGINE_TIMEOUT_SECONDS: {{ .Values.app.aiEngineTimeoutSeconds | quote }}
  AI_ENGINE_PAGE_BATCH_SIZE: {{ .Values.app.aiEnginePageBatchSize | quote }}
  OCR_BACKEND: {{ .Values.app.ocrBackend | quote }}
  OCR_ENGINE_URL: {{ .Values.app.ocrEngineUrl | quote }}
  OCR_ENGINE_TIMEOUT_SECONDS: {{ .Values.app.ocrEngineTimeoutSeconds | quote }}
