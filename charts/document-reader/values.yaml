replicaCount: 1

image:
  repository: registry:5000/document-reader
  tag: prod-latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8082
  targetPort: 8082

app:
  name: document-reader
  namespace: cap-prod-document-reader
  port: 8082
  logLevel: DEBUG
  serviceVersion: "0.1.0"
  environment: prod
  maxUploadSizeBytes: "20971520"
  renderDpi: "96"
  maxImageDimension: "768"
  aiEngineUrl: http://ai-engine.cap-prod-ai-engine.svc.cluster.local:8090/extract/lab-report
  aiEngineTimeoutSeconds: "120"
  aiEnginePageBatchSize: "1"
  ocrBackend: ai-engine
  ocrEngineUrl: http://ocr-engine.cap-prod-ocr-engine.svc.cluster.local:8091/extract/lab-report
  ocrEngineTimeoutSeconds: "120"
  jobTtlSeconds: "3600"

gpu:
  enabled: false
  count: 1

redis:
  image: redis:7.4-alpine
  port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  persistence:
    storageClassName: local-path
    size: 2Gi

resources:
  api:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  worker:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

podLabels: {}
podAnnotations: {}

nodeSelector: {}
tolerations: []
affinity: {}

tracing:
  enabled: "true"
  serviceName: document-reader
  serviceNamespace: cap-prod-document-reader
  endpoint: http://tempo.observability.svc.cluster.local:4318/v1/traces
