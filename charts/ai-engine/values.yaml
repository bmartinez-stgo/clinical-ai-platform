replicaCount: 1

image:
  repository: registry:5000/ai-engine
  tag: prod-latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8090
  targetPort: 8090

app:
  name: ai-engine
  namespace: cap-prod-ai-engine
  port: 8090
  logLevel: DEBUG
  debugLogging: "true"
  serviceVersion: "0.1.0"
  environment: prod
  engineBackend: transformers
  engineId: Qwen/Qwen2.5-VL-3B-Instruct
  maxNewTokens: "4096"
  temperature: "0"
  devicePreference: cuda
  hfHome: /var/cache/huggingface
  transformersCache: /var/cache/huggingface/transformers
  generatedPreviewChars: "2000"
  pytorchCudaAllocConf: expandable_segments:True

gpu:
  enabled: true
  count: 1

resources:
  requests:
    cpu: "2"
    memory: 12Gi
  limits:
    cpu: "6"
    memory: 32Gi

cache:
  mountPath: /var/cache/huggingface

podLabels: {}
podAnnotations: {}

runtimeClassName: nvidia
nodeSelector: {}
tolerations: []
affinity: {}
