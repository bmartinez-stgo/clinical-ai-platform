apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "ai-engine.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/name: ai-engine
    app.kubernetes.io/part-of: clinical-ai-platform
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-engine
      app.kubernetes.io/instance: {{ .Release.Name }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
