replicaCount: 1

image:
  repository: registry:5000/auth
  tag: prod-latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

app:
  name: auth
  namespace: cap-prod-auth
  port: 8081
  logLevel: INFO
  serviceVersion: "0.1.0"
  environment: prod

auth:
  tokenSecret: ""
  refreshTokenSecret: ""
  tokenExpirationSeconds: 3600
  refreshTokenExpirationSeconds: "2592000"
  jwtIssuer: clinical-ai-platform-auth
  jwtAudience: clinical-ai-platform
  usersJson: ""

otel:
  enabled: false
  serviceName: auth
  exporterOtlpEndpoint: ""

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s
  path: /metrics
  additionalLabels: {}

resources: {}

podLabels: {}
podAnnotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
