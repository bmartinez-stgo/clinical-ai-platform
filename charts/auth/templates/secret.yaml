{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "auth.fullname" .) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "auth.fullname" . }}
  labels:
    {{- include "auth.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  AUTH_TOKEN_SECRET: {{ if and $existing (index $existing.data "AUTH_TOKEN_SECRET") }}{{ index $existing.data "AUTH_TOKEN_SECRET" | b64dec }}{{ else }}{{ required "auth.tokenSecret must be set on first install" .Values.auth.tokenSecret | quote }}{{ end }}
  REFRESH_TOKEN_SECRET: {{ if and $existing (index $existing.data "REFRESH_TOKEN_SECRET") }}{{ index $existing.data "REFRESH_TOKEN_SECRET" | b64dec }}{{ else }}{{ required "auth.refreshTokenSecret must be set on first install" .Values.auth.refreshTokenSecret | quote }}{{ end }}
  AUTH_USERS_JSON: {{ if and $existing (index $existing.data "AUTH_USERS_JSON") }}{{ index $existing.data "AUTH_USERS_JSON" | b64dec }}{{ else }}{{ required "auth.usersJson must be set on first install" .Values.auth.usersJson | quote }}{{ end }}
