apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clinical-rag.fullname" . }}
  labels:
    {{- include "clinical-rag.labels" . | nindent 4 }}
data:
  APP_NAME: {{ .Values.app.name | quote }}
  APP_NAMESPACE: {{ .Values.app.namespace | quote }}
  APP_PORT: {{ .Values.app.port | quote }}
  LOG_LEVEL: {{ .Values.app.logLevel | quote }}
  SERVICE_VERSION: {{ .Values.app.serviceVersion | quote }}
  ENVIRONMENT: {{ .Values.app.environment | quote }}
  CHROMADB_HOST: {{ .Values.app.chromadbHost | quote }}
  CHROMADB_PORT: {{ .Values.app.chromadbPort | quote }}
  EMBEDDING_MODEL: {{ .Values.app.embeddingModel | quote }}
  TRACING_ENABLED: {{ .Values.tracing.enabled | quote }}
  OTEL_SERVICE_NAME: {{ .Values.tracing.serviceName | quote }}
  OTEL_SERVICE_NAMESPACE: {{ .Values.tracing.serviceNamespace | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.tracing.endpoint | quote }}
