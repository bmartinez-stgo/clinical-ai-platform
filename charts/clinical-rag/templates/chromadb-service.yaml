apiVersion: v1
kind: Service
metadata:
  name: chromadb
  labels:
    {{- include "clinical-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: chromadb
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: chromadb
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.chromadb.port }}
      targetPort: {{ .Values.chromadb.port }}
      protocol: TCP
