name: Build and Push Auth Service

on:
  push:
    paths:
      - "services/auth/**"
      - ".github/workflows/auth-build.yaml"
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    env:
      IMAGE_NAME: registry:5000/auth
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker
        run: |
          docker version

      - name: Build image
        run: |
          docker build \
            -t $IMAGE_NAME:$IMAGE_TAG \
            -t $IMAGE_NAME:latest \
            -f services/auth/Dockerfile .

      - name: Push image
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

      - name: Output info
        run: |
          echo "Image pushed:"
          echo "$IMAGE_NAME:$IMAGE_TAG"
          echo ""
          echo "Deploy with:"
          echo "helm upgrade --install auth ./charts/auth -n cap-prod-auth --set image.tag=$IMAGE_TAG"
