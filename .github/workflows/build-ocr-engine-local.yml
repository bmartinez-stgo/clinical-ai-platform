name: Build OCR Engine Local

on:
  push:
    branches:
      - main
    paths:
      - "services/ocr-engine/**"
      - "charts/ocr-engine/**"
      - "services/document-reader/**"
      - "charts/document-reader/**"
      - ".github/workflows/build-ocr-engine-local.yml"
  workflow_dispatch:

jobs:
  build-image:
    runs-on: clinical-ai-local

    env:
      IMAGE_REPOSITORY: registry:5000/ocr-engine
      IMAGE_NAME: ocr-engine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for Docker daemon
        run: |
          echo "Waiting for Docker to be ready..."
          for i in $(seq 1 60); do
            if docker info >/dev/null 2>&1; then
              echo "Docker is ready"
              break
            fi
            echo "Docker not ready yet, retry $i/60"
            sleep 2
          done
          docker info

      - name: Define image tags
        id: vars
        run: |
          BUILD_TAG=build-${GITHUB_RUN_NUMBER}
          STABLE_TAG=prod-latest

          echo "build_tag=${BUILD_TAG}" >> $GITHUB_OUTPUT
          echo "stable_tag=${STABLE_TAG}" >> $GITHUB_OUTPUT

      - name: Build ocr-engine image
        run: |
          BUILD_TAG="${{ steps.vars.outputs.build_tag }}"
          STABLE_TAG="${{ steps.vars.outputs.stable_tag }}"

          docker build \
            -t ${IMAGE_REPOSITORY}:${BUILD_TAG} \
            -t ${IMAGE_REPOSITORY}:${STABLE_TAG} \
            ./services/ocr-engine

      - name: Push ocr-engine image tags
        run: |
          BUILD_TAG="${{ steps.vars.outputs.build_tag }}"
          STABLE_TAG="${{ steps.vars.outputs.stable_tag }}"

          docker push ${IMAGE_REPOSITORY}:${BUILD_TAG}
          docker push ${IMAGE_REPOSITORY}:${STABLE_TAG}

      - name: Publish workflow summary
        run: |
          BUILD_TAG="${{ steps.vars.outputs.build_tag }}"
          STABLE_TAG="${{ steps.vars.outputs.stable_tag }}"

          {
            echo "# OCR engine image build summary"
            echo ""
            echo "## Image repository"
            echo "\`registry:5000/ocr-engine\`"
            echo ""
            echo "## Published tags"
            echo "- \`${BUILD_TAG}\`"
            echo "- \`${STABLE_TAG}\`"
            echo ""
            echo "## Manual deploy command"
            echo '```bash'
            echo 'helm upgrade --install ocr-engine ./charts/ocr-engine \'
            echo '  --namespace cap-prod-ocr-engine \'
            echo '  --create-namespace'
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
