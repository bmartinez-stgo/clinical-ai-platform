name: Build Clinical STT Local

on:
  push:
    branches:
      - main
    paths:
      - "services/clinical-stt/**"
      - "charts/clinical-stt/**"
      - ".github/workflows/build-clinical-stt-local.yml"
  workflow_dispatch:

jobs:
  build-image:
    runs-on: clinical-ai-local

    env:
      IMAGE_REPOSITORY: registry:5000/clinical-stt
      IMAGE_NAME: clinical-stt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for Docker daemon
        run: |
          echo "Waiting for Docker to be ready..."
          for i in $(seq 1 60); do
            if docker info >/dev/null 2>&1; then
              echo "Docker is ready"
              break
            fi
            echo "Docker not ready yet, retry $i/60"
            sleep 2
          done
          docker info

      - name: Define image tags
        id: vars
        run: |
          BUILD_TAG=build-${GITHUB_RUN_NUMBER}
          STABLE_TAG=prod-latest
          echo "build_tag=${BUILD_TAG}" >> $GITHUB_OUTPUT
          echo "stable_tag=${STABLE_TAG}" >> $GITHUB_OUTPUT

      - name: Build clinical-stt image
        run: |
          BUILD_TAG="${{ steps.vars.outputs.build_tag }}"
          STABLE_TAG="${{ steps.vars.outputs.stable_tag }}"
          docker build \
            -t ${IMAGE_REPOSITORY}:${BUILD_TAG} \
            -t ${IMAGE_REPOSITORY}:${STABLE_TAG} \
            ./services/clinical-stt

      - name: Push clinical-stt image tags
        run: |
          BUILD_TAG="${{ steps.vars.outputs.build_tag }}"
          STABLE_TAG="${{ steps.vars.outputs.stable_tag }}"
          docker push ${IMAGE_REPOSITORY}:${BUILD_TAG}
          docker push ${IMAGE_REPOSITORY}:${STABLE_TAG}

      - name: Postcheck registry tags
        run: |
          BUILD_TAG="${{ steps.vars.outputs.build_tag }}"
          TAGS_JSON=$(curl -fsS http://registry:5000/v2/${IMAGE_NAME}/tags/list)
          if ! echo "${TAGS_JSON}" | grep -q "\"${BUILD_TAG}\""; then
            echo "ERROR: build tag ${BUILD_TAG} not found in registry"
            exit 1
          fi

      - name: Publish workflow summary
        run: |
          BUILD_TAG="${{ steps.vars.outputs.build_tag }}"
          STABLE_TAG="${{ steps.vars.outputs.stable_tag }}"
          {
            echo "# Clinical STT build summary"
            echo ""
            echo "## Image repository"
            echo "\`registry:5000/clinical-stt\`"
            echo ""
            echo "## Published tags"
            echo "- \`${BUILD_TAG}\`"
            echo "- \`${STABLE_TAG}\`"
            echo ""
            echo "## Manual deploy command"
            echo '```bash'
            echo 'helm upgrade --install clinical-stt ./charts/clinical-stt \'
            echo '  --namespace cap-prod-clinical-stt \'
            echo '  --create-namespace'
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
