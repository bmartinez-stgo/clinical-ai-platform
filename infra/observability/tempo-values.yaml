tempo:
  structuredConfig:
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
            grpc:
              endpoint: 0.0.0.0:4317

    metrics_generator:
      enabled: true
      storage:
        path: /var/tempo/generator/wal
      remote_write:
        - url: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write
          send_exemplars: true

    compactor:
      compaction:
        block_retention: 336h  # 14 days

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    overrides:
      defaults:
        metrics_generator:
          processors:
            - service-graphs
            - span-metrics
          generate_native_histograms: both

persistence:
  enabled: true
  storageClassName: local-path
  size: 20Gi

serviceMonitor:
  enabled: true
  namespace: observability

service:
  annotations: {}
