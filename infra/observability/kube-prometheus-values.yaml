crds:
  enabled: true

defaultRules:
  create: true

alertmanager:
  enabled: true
  service:
    type: ClusterIP

grafana:
  enabled: true
  adminUser: admin
  adminPassword: admin123

  grafana.ini:
    server:
      root_url: https://nahui-ai.ddns.net/grafana
      serve_from_sub_path: true

  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    hosts:
      - nahui-ai.ddns.net
    path: /grafana
    pathType: Prefix
    tls:
      - secretName: nahui-ai-tls
        hosts:
          - nahui-ai.ddns.net

  additionalDataSources:
    - name: Tempo
      type: tempo
      uid: tempo
      url: http://tempo.observability.svc.cluster.local:3200
      access: proxy
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: "-1m"
          spanEndTimeShift: "1m"
          filterByTraceID: true
          filterBySpanID: false
        serviceMap:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true
        lokiSearch:
          datasourceUid: loki
    - name: Loki
      type: loki
      uid: loki
      url: http://loki-gateway.observability.svc.cluster.local
      access: proxy
      jsonData:
        derivedFields:
          - datasourceUid: tempo
            matcherRegex: '"trace_id":"(\w+)"'
            name: TraceID
            url: "$${__value.raw}"

  persistence:
    enabled: true
    type: pvc
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 10Gi

prometheus:
  enabled: true
  service:
    type: ClusterIP

  prometheusSpec:
    retention: 10d
    scrapeInterval: 30s
    evaluationInterval: 30s
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    additionalArgs:
      - name: web.enable-remote-write-receiver
        value: ""

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 30Gi

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

prometheusOperator:
  enabled: true
