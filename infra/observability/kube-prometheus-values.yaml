crds:
  enabled: true

defaultRules:
  create: true

alertmanager:
  enabled: true
  service:
    type: ClusterIP

grafana:
  enabled: true
  adminUser: admin
  adminPassword: admin123

  service:
    type: NodePort
    nodePort: 30000

  persistence:
    enabled: true
    type: pvc
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 10Gi

prometheus:
  enabled: true
  service:
    type: ClusterIP

  prometheusSpec:
    retention: 10d
    scrapeInterval: 30s
    evaluationInterval: 30s
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 30Gi

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

prometheusOperator:
  enabled: true
