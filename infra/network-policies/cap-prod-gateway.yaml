# Default-deny all ingress/egress, then allow only what gateway needs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: cap-prod-gateway
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow inbound from the Nginx ingress controller (typically in ingress-nginx namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: cap-prod-gateway
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
---
# Allow Prometheus scraping from observability namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metrics-scrape
  namespace: cap-prod-gateway
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 8080
---
# Allow DNS resolution and egress to all backend services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress
  namespace: cap-prod-gateway
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cap-prod-auth
      ports:
        - protocol: TCP
          port: 8081
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cap-prod-document-reader
      ports:
        - protocol: TCP
          port: 8082
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cap-prod-ai-diagnostic
      ports:
        - protocol: TCP
          port: 8083
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cap-prod-ai-engine-portal
      ports:
        - protocol: TCP
          port: 8084
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cap-prod-clinical-rag
      ports:
        - protocol: TCP
          port: 8085
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cap-prod-clinical-chat
      ports:
        - protocol: TCP
          port: 8086
