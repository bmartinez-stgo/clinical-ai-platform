apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: cap-prod-clinical-rag
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Reachable from gateway (direct /rag calls) and ai-diagnostic (similar cases lookup)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress
  namespace: cap-prod-clinical-rag
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cap-prod-gateway
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cap-prod-ai-diagnostic
      ports:
        - protocol: TCP
          port: 8085
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metrics-scrape
  namespace: cap-prod-clinical-rag
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 8085
---
# clinical-rag calls ChromaDB (assumed to run in the same namespace or a dedicated one)
# Adjust the ChromaDB namespace/port as needed
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress
  namespace: cap-prod-clinical-rag
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector: {}  # ChromaDB in the same namespace
      ports:
        - protocol: TCP
          port: 8000
