apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: cap-prod-ocr-engine
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Only document-reader may call ocr-engine
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-document-reader
  namespace: cap-prod-ocr-engine
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cap-prod-document-reader
      ports:
        - protocol: TCP
          port: 8091
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metrics-scrape
  namespace: cap-prod-ocr-engine
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 8091
---
# ocr-engine runs inference locally — only needs DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dns
  namespace: cap-prod-ocr-engine
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
