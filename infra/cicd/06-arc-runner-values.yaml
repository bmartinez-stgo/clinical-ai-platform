githubConfigUrl: "https://github.com/bmartinez-stgo/clinical-ai-platform"
githubConfigSecret: github-auth

runnerScaleSetName: "clinical-ai-local"

minRunners: 0
maxRunners: 2

template:
  spec:
    restartPolicy: Never
    initContainers:
      - name: init-dind-externals
        image: ghcr.io/actions/actions-runner:latest
        command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
        volumeMounts:
          - name: dind-externals
            mountPath: /home/runner/tmpDir

      - name: init-dind-rootless
        image: docker:dind-rootless
        command:
          - sh
          - -c
          - |
            set -x
            cp -a /etc/. /dind-etc/
            echo 'runner:x:1001:1001:runner:/home/runner:/bin/ash' >> /dind-etc/passwd
            echo 'runner:x:1001:' >> /dind-etc/group
            echo 'runner:100000:65536' >> /dind-etc/subgid
            echo 'runner:100000:65536' >> /dind-etc/subuid
            chmod 755 /dind-etc
            chmod u=rwx,g=rx+s,o=rx /dind-home
            chown 1001:1001 /dind-home
        securityContext:
          runAsUser: 0
        volumeMounts:
          - name: dind-etc
            mountPath: /dind-etc
          - name: dind-home
            mountPath: /dind-home

    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        env:
          - name: DOCKER_HOST
            value: unix:///run/user/1001/docker.sock
          - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
            value: "false"
        securityContext:
          privileged: true
          runAsUser: 1001
          runAsGroup: 1001
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /run/user/1001

      - name: dind
        image: docker:dind-rootless
        args:
          - dockerd
          - --host=unix:///run/user/1001/docker.sock
          - --insecure-registry=registry.cicd.svc.cluster.local:5000
        securityContext:
          privileged: true
          runAsUser: 1001
          runAsGroup: 1001
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /run/user/1001
          - name: dind-externals
            mountPath: /home/runner/externals
          - name: dind-etc
            mountPath: /etc
          - name: dind-home
            mountPath: /home/runner

    volumes:
      - name: work
        emptyDir: {}
      - name: dind-externals
        emptyDir: {}
      - name: dind-sock
        emptyDir: {}
      - name: dind-etc
        emptyDir: {}
      - name: dind-home
        emptyDir: {}
